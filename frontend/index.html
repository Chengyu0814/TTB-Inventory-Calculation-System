<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>飛買家庫存計算系統</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .select-card-grid {
        display: flex;
        gap: 20px;
        margin-top: 0;
      }

      .airline-card {
        flex: 1;
        border-radius: 20px;
        padding: 36px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.25s ease;
        border: 2px solid transparent;
        position: relative;
        overflow: hidden;
      }

      .airline-card::before {
        content: '';
        position: absolute;
        inset: 0;
        opacity: 0;
        transition: opacity 0.25s ease;
        border-radius: inherit;
      }

      .airline-card:hover::before {
        opacity: 1;
      }

      /* 虎航 - 橘色 */
      .airline-card.tigerair {
        background: rgba(234, 88, 12, 0.06);
        border-color: rgba(234, 88, 12, 0.3);
      }

      .airline-card.tigerair::before {
        background: rgba(234, 88, 12, 0.08);
      }

      .airline-card.tigerair:hover {
        border-color: rgba(234, 88, 12, 0.7);
        transform: translateY(-4px);
        box-shadow: 0 12px 36px rgba(234, 88, 12, 0.2);
      }

      /* 華航 - 藍色 */
      .airline-card.china-airlines {
        background: rgba(37, 99, 235, 0.06);
        border-color: rgba(37, 99, 235, 0.3);
      }

      .airline-card.china-airlines::before {
        background: rgba(37, 99, 235, 0.08);
      }

      .airline-card.china-airlines:hover {
        border-color: rgba(37, 99, 235, 0.7);
        transform: translateY(-4px);
        box-shadow: 0 12px 36px rgba(37, 99, 235, 0.2);
      }

      .airline-logo {
        font-size: 3rem;
        line-height: 1;
      }

      .airline-name {
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--text-primary);
      }

      .airline-code {
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.1em;
        padding: 3px 10px;
        border-radius: 20px;
      }

      .tigerair .airline-code {
        background: rgba(234, 88, 12, 0.15);
        color: #fb923c;
      }

      .china-airlines .airline-code {
        background: rgba(37, 99, 235, 0.15);
        color: #60a5fa;
      }

      .airline-desc {
        font-size: 0.75rem;
        color: var(--text-secondary);
        text-align: center;
        line-height: 1.5;
      }

      .airline-arrow {
        font-size: 1.2rem;
        margin-top: 4px;
        transition: transform 0.2s ease;
        color: var(--text-secondary);
      }

      .airline-card:hover .airline-arrow {
        transform: translateX(4px);
      }

      .select-wrapper {
        width: 520px;
      }

      .select-subtitle {
        font-size: 0.78rem;
        color: var(--text-secondary);
        text-align: center;
        margin-bottom: 24px;
      }
    </style>
  </head>
  <body>
    <div class="page-title">
      <h1><span>飛買家庫存計算系統</span></h1>
    </div>

    <div class="calculator-card uploader-card select-wrapper">
      <p class="select-subtitle">請選擇要使用的航空公司庫存計算系統</p>

      <div class="select-card-grid">
        <a href="tigerair.html" class="airline-card tigerair">
          <div class="airline-logo">🐯</div>
          <div class="airline-name">虎航</div>
          <div class="airline-code">TTW · Tigerair Taiwan</div>
          <div class="airline-desc">TTB 虎航庫存計算<br>補貨建議報表</div>
          <div class="airline-arrow">→</div>
        </a>

        <a href="china-airlines.html" class="airline-card china-airlines">
          <div class="airline-logo">✈️</div>
          <div class="airline-name">華航</div>
          <div class="airline-code">CAL · China Airlines</div>
          <div class="airline-desc">華航庫存計算<br>補貨建議報表</div>
          <div class="airline-arrow">→</div>
        </a>
      </div>
    </div>

    <p style="text-align:center;color:var(--text-secondary);font-size:0.85rem;margin-top:1rem;">Create by Peter (Update: 2026/04/09)</p>
  </body>
</html>
